<!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><style>
body{margin:0;background:transparent;font-family:Arial,sans-serif;color:#fff;overflow:hidden}.box{position:absolute;left:30px;top:30px;min-width:340px;background:rgba(9,7,15,.78);border:2px solid rgba(155,92,255,.65);border-radius:20px;padding:18px;box-shadow:0 12px 40px rgba(0,0,0,.4)}.title{font-size:24px;font-weight:900;letter-spacing:.04em;margin-bottom:12px}.row{display:flex;align-items:center;gap:12px;margin:9px 0}.word{width:135px;text-transform:uppercase;color:#d8ccff;font-weight:800}.count{font-size:34px;font-weight:1000}.bar{flex:1;height:10px;background:rgba(255,255,255,.14);border-radius:99px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#9b5cff,#00ff9d);width:0}.status{font-size:12px;color:#aaa;margin-top:10px}.hot{animation:pulse .45s ease}@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
</style></head><body><div class="box"><div class="title">🔥 CHAT HOT WORDS</div><div id="rows"></div><div class="status" id="status">connecting...</div></div><script>
let last={};function connect(){const proto=location.protocol==='https:'?'wss':'ws';const ws=new WebSocket(`${proto}://${location.host}/live`);ws.onmessage=e=>{const m=JSON.parse(e.data); if(m.type==='snapshot') render(m.data)};ws.onclose=()=>setTimeout(connect,1500)}connect();function esc(s){return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}function render(state){const max=Math.max(1,...state.topWords.map(x=>x.count));document.getElementById('rows').innerHTML=state.topWords.slice(0,6).map(x=>{const changed=(last[x.word]??x.count)!==x.count;last[x.word]=x.count;return `<div class="row ${changed?'hot':''}"><div class="word">${esc(x.word)}</div><div class="bar"><div class="fill" style="width:${Math.round(x.count/max*100)}%"></div></div><div class="count">${x.count}</div></div>`}).join('');document.getElementById('status').textContent=(state.status.connected?'connected':'disconnected')+' @'+(state.status.channel||'not-set')}</script></body></html>

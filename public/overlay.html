<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body{margin:0;background:transparent;font-family:Inter,Arial,sans-serif;color:white;overflow:hidden}.box{width:430px;background:rgba(11,11,16,.76);border:1px solid rgba(255,255,255,.14);border-radius:22px;padding:22px;box-shadow:0 20px 50px rgba(0,0,0,.35)}.title{font-size:30px;font-weight:900;margin-bottom:14px}.row{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.08);border-radius:14px;padding:12px 15px;margin-top:10px}.word{font-size:25px;font-weight:900;text-transform:uppercase}.count{font-size:34px;font-weight:1000;color:#a78bfa}.status{font-size:13px;color:#d1d5db;margin-top:12px}
  </style>
</head>
<body>
  <div class="box"><div class="title">🔥 Hot Words</div><div id="rows"></div><div id="status" class="status">Connecting...</div></div>
<script>
const socket=io();socket.on('state',render);fetch('/api/state').then(r=>r.json()).then(render);
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function render(s){const top=(s.words||[]).slice(0,5); rows.innerHTML=top.map(w=>`<div class="row"><div class="word">${esc(w.word)}</div><div class="count">${w.count}</div></div>`).join('')||'<div class="status">No words set</div>'; status.textContent=(s.connected?'Connected':'Disconnected')+(s.channel?' • @'+s.channel:'');}
</script>
</body>
</html>

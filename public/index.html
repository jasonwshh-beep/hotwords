<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kick Hot Words Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root{--bg:#0b0b10;--panel:#171720;--text:#fff;--muted:#a7a7b3;--accent:#8b5cf6;--good:#22c55e;--bad:#ef4444}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top,#221a3a,#0b0b10 45%);color:var(--text);font-family:Inter,Arial,sans-serif}
    .wrap{max-width:1100px;margin:0 auto;padding:28px}.top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;flex-wrap:wrap}
    h1{margin:0;font-size:36px}.sub{color:var(--muted);margin-top:8px}.card{background:rgba(23,23,32,.88);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
    .grid{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;margin-top:18px}.words{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.word{background:#101018;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px}.word .name{font-size:22px;font-weight:800}.word .count{font-size:52px;font-weight:900;color:var(--accent);margin-top:8px}
    .pill{display:inline-flex;align-items:center;gap:7px;padding:8px 12px;border-radius:999px;background:#101018;color:var(--muted);font-weight:700}.dot{width:9px;height:9px;border-radius:99px;background:var(--bad)}.on .dot{background:var(--good)}
    input,textarea{width:100%;background:#0f0f16;border:1px solid rgba(255,255,255,.14);color:#fff;border-radius:12px;padding:12px;font-size:15px}label{display:block;color:var(--muted);font-weight:700;margin:12px 0 7px}button{background:var(--accent);border:0;color:white;border-radius:12px;padding:12px 16px;font-weight:900;cursor:pointer;margin-top:10px}button.secondary{background:#272736}.row{display:flex;gap:10px;flex-wrap:wrap}
    .list{display:flex;flex-direction:column;gap:10px;max-height:430px;overflow:auto}.hit{background:#101018;border-left:4px solid var(--accent);border-radius:10px;padding:10px}.meta{color:var(--muted);font-size:12px}.msg{margin-top:5px;line-height:1.35}.error{color:#ff9b9b;margin-top:8px;word-break:break-word}@media(max-width:850px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><h1>Kick Hot Words</h1><div class="sub">Tracks chosen words and phrases from your Kick chat in real time.</div></div>
    <div id="status" class="pill"><span class="dot"></span><span>Connecting...</span></div>
  </div>

  <div class="grid">
    <section class="card">
      <h2>Hot word counts</h2>
      <div id="words" class="words"></div>
    </section>
    <aside class="card">
      <h2>Controls</h2>
      <label>Admin PIN</label><input id="pin" placeholder="1234" type="password" />
      <label>Words/phrases to track, comma separated</label><textarea id="wordInput" rows="4" placeholder="maxwin, bonus, retrigger"></textarea>
      <div class="row"><button onclick="saveWords()">Save Words</button><button class="secondary" onclick="resetAll()">Reset Counts</button><button class="secondary" onclick="sendTest()">Send Test</button></div>
      <p class="sub">OBS URL: <b>/overlay</b>. Add it as a Browser Source in OBS.</p>
      <div id="error" class="error"></div>
    </aside>
  </div>

  <div class="grid">
    <section class="card"><h2>Recent hot word hits</h2><div id="hits" class="list"></div></section>
    <section class="card"><h2>Recent chat messages</h2><div id="messages" class="list"></div></section>
  </div>
</div>
<script>
const socket=io();let current=[];
socket.on('state', render);
async function getState(){render(await fetch('/api/state').then(r=>r.json()))} getState();
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function render(s){current=s.words||[]; wordInput.value=current.map(w=>w.word).join(', '); const st=document.getElementById('status'); st.className='pill '+(s.connected?'on':''); st.innerHTML=`<span class="dot"></span><span>${s.connected?'Connected':'Disconnected'} ${s.channel?'@'+s.channel:''}</span>`; error.textContent=s.lastError||''; words.innerHTML=current.map(w=>`<div class="word"><div class="name">${esc(w.word)}</div><div class="count">${w.count}</div></div>`).join('')||'<p class="sub">No words configured.</p>'; hits.innerHTML=(s.recentHits||[]).map(h=>`<div class="hit"><div class="meta">${esc(h.username)} • ${new Date(h.at).toLocaleTimeString()} • ${esc((h.words||[]).join(', '))}</div><div class="msg">${esc(h.text)}</div></div>`).join('')||'<p class="sub">No hits yet.</p>'; messages.innerHTML=(s.recentMessages||[]).map(m=>`<div class="hit"><div class="meta">${esc(m.username)} • ${new Date(m.at).toLocaleTimeString()}</div><div class="msg">${esc(m.text)}</div></div>`).join('')||'<p class="sub">No messages yet.</p>';}
async function post(url,body={}){const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','x-admin-pin':pin.value},body:JSON.stringify(body)}); const d=await r.json().catch(()=>({})); if(!r.ok) alert(d.error||'Request failed'); return d;}
async function saveWords(){await post('/api/words',{words:wordInput.value});}
async function resetAll(){if(confirm('Reset all counts?')) await post('/api/reset');}
async function sendTest(){await post('/api/test-message',{username:'TestUser',text:'bonus maxwin retrigger'});}
</script>
</body>
</html>

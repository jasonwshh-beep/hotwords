<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Kick Hot Words Pro</title><style>
:root{--bg:#0d0b14;--card:#171224;--card2:#211936;--txt:#fff;--muted:#a99fc1;--accent:#9b5cff;--good:#00ff9d;--bad:#ff4d6d}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#25164a,var(--bg));color:var(--txt);font-family:Inter,Arial,sans-serif}.wrap{max-width:1180px;margin:0 auto;padding:26px}.top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}.brand h1{margin:0;font-size:30px}.brand p{margin:6px 0 0;color:var(--muted)}.pill{padding:10px 14px;border-radius:999px;background:var(--card);border:1px solid #382b55}.ok{color:var(--good)}.no{color:var(--bad)}.grid{display:grid;grid-template-columns:1.3fr .9fr;gap:18px;margin-top:22px}.card{background:rgba(23,18,36,.92);border:1px solid #352852;border-radius:18px;padding:18px;box-shadow:0 18px 55px rgba(0,0,0,.28)}.words{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px}.word{background:linear-gradient(180deg,var(--card2),#150f24);border:1px solid #3b2d5f;border-radius:16px;padding:18px}.word .name{text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-size:13px}.word .count{font-size:54px;font-weight:900;margin-top:8px}.bar{height:9px;border-radius:20px;background:#302646;overflow:hidden;margin-top:8px}.bar span{display:block;height:100%;background:linear-gradient(90deg,#7a4cff,#00ff9d);width:0}.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}input,button,textarea{border-radius:12px;border:1px solid #3c2e5d;background:#0f0b18;color:#fff;padding:12px;font-size:15px}button{cursor:pointer;background:linear-gradient(180deg,#8b5cf6,#6d3ee8);border:0;font-weight:800}button.secondary{background:#241b38}.section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}table{width:100%;border-collapse:collapse}td,th{padding:9px;border-bottom:1px solid #302546;text-align:left;color:#ddd}th{color:#a99fc1;font-size:12px;text-transform:uppercase}.hit{padding:10px 0;border-bottom:1px solid #302546}.hit b{color:#00ff9d}.small{color:var(--muted);font-size:13px}.err{color:#ff8aa0;word-break:break-word}@media(max-width:850px){.grid{grid-template-columns:1fr}.wrap{padding:14px}.word .count{font-size:42px}}
</style></head><body><div class="wrap"><div class="top"><div class="brand"><h1>Kick Hot Words Pro</h1><p>Tracks hot words in Kick chat in real time.</p></div><div class="pill" id="status">Loading...</div></div><div id="error" class="err small" style="margin-top:10px"></div>
<div class="grid"><main class="card"><div class="section-title"><h2 style="margin:0">Hot Words</h2><a href="/overlay" target="_blank" class="small">Open OBS overlay →</a></div><div id="words" class="words"></div><div class="controls"><input id="pin" placeholder="Admin PIN" type="password"/><button onclick="resetCounts()">Reset Counts</button><button class="secondary" onclick="testMsg()">Send Test Message</button><a href="/api/export.csv"><button class="secondary">Export CSV</button></a></div><div class="controls" style="align-items:stretch"><textarea id="wordInput" rows="2" style="flex:1;min-width:280px" placeholder="left,right,bonus,maxwin"></textarea><button onclick="saveWords()">Save Words</button></div></main><aside class="card"><h2 style="margin-top:0">Recent Hits</h2><div id="hits"></div></aside></div><div class="grid"><section class="card"><h2 style="margin-top:0">Top Users Per Word</h2><div id="topUsers"></div></section><section class="card"><h2 style="margin-top:0">Recent Chat</h2><div id="chat"></div></section></div></div><script>
let state=null; const $=id=>document.getElementById(id); function connect(){const proto=location.protocol==='https:'?'wss':'ws';const ws=new WebSocket(`${proto}://${location.host}/live`);ws.onmessage=e=>{const msg=JSON.parse(e.data);if(msg.type==='snapshot'){state=msg.data;render()}};ws.onclose=()=>setTimeout(connect,1500)}connect();async function api(url,body){const r=await fetch(url,{method:'POST',headers:{'content-type':'application/json','x-admin-pin':$('pin').value},body:JSON.stringify(body||{})});const d=await r.json().catch(()=>({}));if(!r.ok) alert(d.error||'Request failed');return d}
function render(){if(!state)return; const s=state.status; $('status').innerHTML=`${s.connected?'<span class="ok">Connected</span>':'<span class="no">Disconnected</span>'} @${s.channel||'not-set'} ${s.chatroomId?`<span class="small">room ${s.chatroomId}</span>`:''}`;$('error').textContent=s.lastError?`Last error: ${s.lastError}`:''; $('wordInput').value=state.hotWords.join(','); const max=Math.max(1,...state.topWords.map(x=>x.count)); $('words').innerHTML=state.topWords.map(x=>`<div class="word"><div class="name">${esc(x.word)}</div><div class="count">${x.count}</div><div class="bar"><span style="width:${Math.round((x.count/max)*100)}%"></span></div></div>`).join(''); $('hits').innerHTML=state.recentHits.slice(0,15).map(h=>`<div class="hit"><b>${esc(h.word)}</b> by ${esc(h.username)} <div class="small">${esc(h.message).slice(0,120)}</div></div>`).join('')||'<div class="small">No hits yet.</div>'; $('chat').innerHTML=state.chatLog.slice(0,18).map(c=>`<div class="hit"><b>${esc(c.username)}</b><div class="small">${esc(c.message).slice(0,140)}</div></div>`).join('')||'<div class="small">No chat yet.</div>'; $('topUsers').innerHTML=state.hotWords.map(w=>`<h3>${esc(w)}</h3><table><tr><th>User</th><th>Count</th></tr>${(state.topUsers[w]||[]).map(u=>`<tr><td>${esc(u.username)}</td><td>${u.count}</td></tr>`).join('')||'<tr><td colspan="2" class="small">No users yet</td></tr>'}</table>`).join('')}
function esc(s){return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}async function resetCounts(){if(confirm('Reset all counts?')) await api('/api/reset')}async function saveWords(){await api('/api/words',{words:$('wordInput').value})}async function testMsg(){await api('/api/test-message',{username:'TestUser',message:'left right bonus left'})}</script></body></html>
